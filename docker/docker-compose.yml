name: devuko-crm

services:
  postgres:
    image: postgres:16-alpine
    container_name: devuko-crm-postgres
    restart: unless-stopped
    env_file:
      - ../apps/api/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devuko}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devuko}
      POSTGRES_DB: ${POSTGRES_DB:-devuko_crm}
    ports:
      - "5440:5432"
    volumes:
      - devuko_crm_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    container_name: devuko-crm-api
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../apps/api/.env
    ports:
      - "8095:8095"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8095"
      DATABASE_URL: postgresql://${POSTGRES_USER:-devuko}:${POSTGRES_PASSWORD:-devuko}@postgres:5432/${POSTGRES_DB:-devuko_crm}
      PLATFORM_REPO_ROOT: /repo
      DEVUKO_CRM_REPO_ROOT: /srv/sites/crm.devuko.ru/repo
    volumes:
      - ..:/repo
      - /srv/sites:/srv/sites
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

  web:
    container_name: devuko-crm-web
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      args:
        VITE_PUBLIC_URL: ${VITE_PUBLIC_URL:-https://crm.devuko.ru}
    restart: unless-stopped
    ports:
      - "8096:80"
    depends_on:
      - api

volumes:
  devuko_crm_pg:
