# Temporary HTTP serve (no HTTPS redirect) until TLS cert is issued.
# Replace with devuko-crm-production-http.conf after certbot succeeds.

upstream devuko_crm_api {
    server 127.0.0.1:8095;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name crm.devuko.ru;

    root /srv/sites/crm.devuko.ru/repo/apps/web/dist;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    include /etc/nginx/sites-available/devuko-crm-locations.inc;
}
