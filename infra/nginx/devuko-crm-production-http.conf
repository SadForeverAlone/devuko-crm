# Production HTTP → HTTPS + ACME webroot.

server {
    listen 80;
    listen [::]:80;
    server_name crm.devuko.ru www.devuko.ru devuko.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
