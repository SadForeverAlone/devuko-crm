# Production HTTPS: crm.devuko.ru
# Requires: devuko-crm-locations.inc in sites-available.

upstream devuko_crm_api {
    server 127.0.0.1:8095;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crm.devuko.ru www.devuko.ru devuko.ru;

    ssl_certificate     /etc/nginx/ssl/crm.devuko.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/crm.devuko.ru/privkey.pem;
    # Or Let's Encrypt:
    # ssl_certificate     /etc/letsencrypt/live/crm.devuko.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/crm.devuko.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /srv/sites/crm.devuko.ru/repo/apps/web/dist;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    include /etc/nginx/sites-available/devuko-crm-locations.inc;
}
